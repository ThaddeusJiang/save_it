[tools]
elixir = "1.19.5"

[env]
_.file = '.env'

[tasks.update-zeabur-template]
description = "Update Zeabur template"
run = [
  "echo 'Updating Zeabur template...'",
  "npx zeabur template update -c FTAONK -f others/zeabur/template.yaml",
  "echo '✅ https://zeabur.com/templates/FTAONK'",
]

[tasks.dev]
description = "Run dev"
run = [
    "mix ts.migrate",
    "iex -S mix run --no-halt"
]

[tasks.stop-all]
description = "Stop all local save_it iex processes"
run = '''
stopped=0

for pid in $(pgrep -f '[m]ix run --no-halt' || true); do
    cwd=$(lsof -a -p "$pid" -d cwd -Fn 2>/dev/null | sed -n 's/^n//p')

    if [ -n "$cwd" ] && [ -f "$cwd/mix.exs" ] && grep -q 'app: :save_it' "$cwd/mix.exs"; then
        if kill "$pid" 2>/dev/null; then
            echo "Stopped save_it process $pid"
            stopped=1
        fi
    fi
done

if [ "$stopped" -eq 0 ]; then
    echo "No local save_it iex process found."
fi
'''
