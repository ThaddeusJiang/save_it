# Manually create and publish a GitHub pre-release from the selected branch and tag.
name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (for example: v0.4.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-manual-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: prepare
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          echo "version=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub CLI
        run: gh --version

      - name: Create published GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          version="${INPUT_TAG#v}"

          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { next_section=1; next }
            next_section && /^## \[/ { exit }
            next_section { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            printf 'Release %s\n' "$INPUT_TAG" > release-notes.md
          fi

          gh release create "$INPUT_TAG" \
            --target "$RELEASE_BRANCH" \
            --title "$INPUT_TAG" \
            --notes-file release-notes.md \
            --prerelease

  docker:
    needs: release
    uses: ./.github/workflows/docker-publish.yml
    with:
      is_prerelease: true
      version: ${{ needs.release.outputs.version }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
