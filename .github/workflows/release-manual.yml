# Manually create and publish a GitHub pre-release from the selected branch and tag.
name: Release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (for example: 2026.5.25 or 2026.5.25-rc.1)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-manual-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: release (${{ inputs.tag }})
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: prepare
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          echo "version=${INPUT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure GitHub CLI
        run: gh --version

      - name: Create published GitHub pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          gh release create "$INPUT_TAG" \
            --target "$RELEASE_BRANCH" \
            --title "save_it $INPUT_TAG" \
            --generate-notes \
            --prerelease

  docker:
    name: docker (${{ needs.release.outputs.version }})
    needs: release
    uses: ./.github/workflows/docker-publish.yml
    with:
      is_prerelease: true
      version: ${{ needs.release.outputs.version }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
