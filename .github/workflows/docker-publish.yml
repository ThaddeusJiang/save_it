name: Docker Publish

on:
  workflow_call:
    inputs:
      is_prerelease:
        description: "Whether the source release is a prerelease"
        type: boolean
        required: false
        default: false
      version:
        description: "Semver version to tag (e.g. 1.2.3)"
        type: string
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thaddeusjiang/save_it
          tags: |
            type=raw,value=latest,enable=${{ !inputs.is_prerelease }}
            type=raw,value=stag,enable=${{ inputs.is_prerelease }}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify published manifests
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          printf '%s\n' "$TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker buildx imagetools inspect "$tag"
          done
