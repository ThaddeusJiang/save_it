services:
  save_it:
    profiles: ["prod"]
    image: ghcr.io/thaddeusjiang/save_it:latest
    restart: on-failure
    env_file:
      - .env
    environment:
      COBALT_API_URL: "http://cobalt-api:9000"
      TYPESENSE_URL: "http://typesense:8108"
    depends_on:
      cobalt-api:
        condition: service_started
      typesense:
        condition: service_started

  cobalt-api:
    image: ghcr.io/imputnet/cobalt:10
    init: true
    read_only: true
    restart: on-failure
    ports:
      - 9001:9000/tcp
    environment:
      API_URL: "http://cobalt-api:9000/"

  typesense:
    image: typesense/typesense:30.2
    restart: on-failure
    ports:
      - "8108:8108"
    volumes:
      - save_it_typesense_data:/data
    command: "--data-dir=/data --api-key=xyz --enable-cors"

  typelens:
    image: ghcr.io/copperline-ai/typelens:1.26.0
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      TYPESENSE_SERVER_NAME: "Local Typesense"
      TYPESENSE_HOST: "typesense"
      TYPESENSE_PORT: "8108"
      TYPESENSE_PROTOCOL: "http"
      TYPESENSE_API_KEY: "xyz"
      AUTH_USERNAME: "test@example.com"
      AUTH_PASSWORD: "pass123456"
    depends_on:
      typesense:
        condition: service_started

  save_it_e2e:
    profiles: ["e2e"]
    image: save_it:e2e
    restart: on-failure
    env_file:
      - .env
    environment:
      COBALT_API_URL: "http://cobalt-api:9000"
      TYPESENSE_URL: "http://typesense:8108"
    depends_on:
      cobalt-api:
        condition: service_started
      typesense:
        condition: service_started

volumes:
  save_it_typesense_data:
    name: save_it_typesense_data
